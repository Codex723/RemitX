name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'eslint.config.mjs'
      - 'prisma/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'eslint.config.mjs'
      - 'prisma/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend:
    name: Lint, Test & Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      # Uncomment once a test script exists in package.json (e.g. vitest/jest)
      # - name: Run tests
      #   run: npm test -- --ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Provide dummy/test values so the build doesn't fail on missing env vars.
          # Replace with actual required vars from .env.example, or set as repo secrets.
          STELLAR_NETWORK: testnet
