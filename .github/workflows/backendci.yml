name: Backend CI (API routes / Prisma)

on:
  push:
    branches: [main]
    paths:
      - 'src/app/api/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backendci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/app/api/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backendci.yml'

jobs:
  backend:
    name: Prisma Validate & API Tests
    runs-on: ubuntu-latest

    # Spin up a real Postgres instance so Prisma migrations/tests
    # run against an actual DB instead of Supabase directly.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: remitx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remitx_test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check for un-generated migrations (schema drift)
        run: npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code

      - name: Run migrations against test DB
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        run: npx prisma generate

      # Run API route tests
      - name: Run API tests
        run: npm run test -- --ci
